<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ID-Zero — Open-source peer-to-peer digital identity protocol. One person. One node. Zero data exposed.">
  <title>ID-Zero — One person. One node. Zero data exposed.</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #020818;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #4a9eff;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    main {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .logo {
      width: 100%;
      max-width: 480px;
      height: auto;
      margin-bottom: 2rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 2.5rem;
    }

    .description {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 3rem;
    }

    .pills {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }

    .pill {
      font-size: 0.75rem;
      padding: 0.3rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .status::before {
      content: "";
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 0.5rem;
      vertical-align: middle;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: var(--border);
    }
  </style>
</head>
<body>
  <main>
  <object type="image/svg+xml" data="logo.svg" class="logo" aria-label="ID-Zero Logo">
    ID-Zero — One person. One node. Zero data exposed.
  </object>
    
    <p class="description">
      An open-source peer-to-peer digital identity protocol.<br>
      Verified by cryptographic proof. No central database.<br>
      No data stored. Just proof that you&rsquo;re real and unique.
    </p>

    <div class="pills">
      <span class="pill">Zero-knowledge proofs</span>
      <span class="pill">Peer-to-peer</span>
      <span class="pill">Open source</span>
      <span class="pill">GDPR by design</span>
    </div>

    <p class="status">In development &mdash; coming soon</p>
  </main>

  <footer>id-zero.org</footer>
</body>
</html>
